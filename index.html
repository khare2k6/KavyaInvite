<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavya's Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- Landing -->
        <section id="landing">

            <picture>
                <source media="(max-width:768px)"
                        srcset="assets/stage-mobile.png">

                <img id="landingStage"
                     src="assets/stage-landscape.png"
                     alt="Stage">
            </picture>

            <div id="landingOverlay">

                <button id="startBtn">
                    🎵 Begin the Music
                </button>

            </div>

        </section>

        <!-- Piano Screen -->
        <section id="pianoScreen" class="hidden">

            <picture>
                <source media="(max-width:768px)"
                        srcset="assets/piano-mobile.png">

                <img id="pianoStage"
                     src="assets/piano-landscape.png"
                     alt="Piano Stage">
            </picture>

            <div id="pianoContainer">

                <h2>🎹 Play the Happy Birthday Melody</h2>

                <p id="status">
                    Watch and listen, then repeat the notes.
                </p>

                <div id="piano">

                    <div class="key" data-key="0"></div>
                    <div class="key" data-key="1"></div>
                    <div class="key" data-key="2"></div>
                    <div class="key" data-key="3"></div>
                    <div class="key" data-key="4"></div>

                </div>

            </div>

        </section>

        <!-- Invitation -->
        <section id="inviteScreen" class="hidden">

            <img id="inviteImage"
                 src="assets/invite.png"
                 alt="Invitation">

            <div id="inviteButtons">

                <button id="mapBtn">
                    📍 Open Maps
                </button>

                <button id="rsvpBtn">
                    💬 RSVP
                </button>

            </div>

        </section>

    </div>

    <script src="game.js"></script>
</body>
</html>
