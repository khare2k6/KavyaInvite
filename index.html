<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavya's Piano Recital & Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">

        <!-- Landing -->
        <section id="landing">

            <img id="stage" src="assets/stage.png" alt="Stage">

            <div id="landingOverlay">

                <button id="startBtn">
                    🎵 Begin the Music
                </button>

            </div>

        </section>

        <!-- Piano Screen -->
        <section id="pianoScreen" class="hidden">

            <img id="stage" src="assets/stage.png" alt="Stage">

            <div id="pianoContainer">

                <h2>🎹 Repeat the Melody</h2>

                <p id="status">
                    Listen Carefully...
                </p>

                <div id="piano">

                    <div class="key" data-key="0"></div>
                    <div class="key" data-key="1"></div>
                    <div class="key" data-key="2"></div>
                    <div class="key" data-key="3"></div>
                    <div class="key" data-key="4"></div>

                </div>

            </div>

        </section>

        <!-- Invitation -->
        <section id="inviteScreen" class="hidden">

            <img id="inviteImage"
                 src="assets/invite.png"
                 alt="Invitation">

            <div id="inviteButtons">

                <button id="mapBtn">
                    📍 Open Maps
                </button>

                <button id="rsvpBtn">
                    💬 RSVP
                </button>

            </div>

        </section>

    </div>

    <script src="game.js"></script>
</body>
</html>
